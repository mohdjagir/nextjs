name: Next Js App Concurrency Deployment

on: 
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest

    concurrency: 
      group: deploy
      cancel-in-progress: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2
      - name: Install Dependencies
        run: npm install
      - name: Build NextJS App
        run: npm run build
      - name: Deploy
        run: echo "Deploy Next JS App"
      
